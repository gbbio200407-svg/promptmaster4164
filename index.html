        // SmartInput Component
        const SmartInput = ({ label, name, value, onChange, options = [], placeholder, isTextArea = false }) => {
            const [mode, setMode] = useState('select');
            const isCustom = !options || options.length === 0;

            useEffect(() => { if (!value) setMode('select'); }, [options]);
            useEffect(() => { if (isCustom) setMode('input'); }, [isCustom]);

            const handleSelectChange = (e) => {
                const val = e.target.value;
                if (val === 'DIRECT_INPUT') {
                    setMode('input');
                    onChange({ target: { name, value: '' } });
                } else {
                    onChange(e);
                }
            };

            const switchToSelect = () => {
                setMode('select');
                onChange({ target: { name, value: '' } });
            };

            return (
                <div className="mb-5">
                    <div className="flex justify-between items-center mb-1">
                        <label className="block text-sm font-bold text-slate-700">{label}</label>
                        {!isCustom && mode === 'input' && (
                            <button onClick={switchToSelect} className="text-xs flex items-center gap-1 text-indigo-600 hover:text-indigo-800 font-medium"><Icons.Refresh /> 추천 목록 보기</button>
                        )}
                    </div>
                    {!isCustom && mode === 'select' ? (
                        <div className="relative">
                            <select name={name} value={value} onChange={handleSelectChange} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400 outline-none transition-all text-sm appearance-none cursor-pointer text-slate-700">
                                <option value="">선택하세요 (또는 직접 입력)</option>
                                {options.map((opt, idx) => (<option key={idx} value={opt}>{opt}</option>))}
                                <option value="DIRECT_INPUT" className="font-bold text-indigo-600 bg-indigo-50">✍️ 직접 입력하기 (Direct Input)</option>
                            </select>
                            <div className="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                            </div>
                        </div>
                    ) : (
                        <div className="relative animate-fade-in">
                            {isTextArea ? (
                                <textarea name={name} value={value} onChange={onChange} rows="3" placeholder={placeholder || "내용을 입력하세요..."} className="w-full px-4 py-3 bg-white border-2 border-indigo-100 rounded-lg focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 outline-none transition-all text-sm resize-none"/>
                            ) : (
                                <input type="text" name={name} value={value} onChange={onChange} placeholder={placeholder || "내용을 입력하세요..."} className="w-full px-4 py-3 bg-white border-2 border-indigo-100 rounded-lg focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 outline-none transition-all text-sm" autoFocus={!isCustom}/>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // Main App Component
        function App() {
            const [selectedCat, setSelectedCat] = useState(Categories[0]); 
            const [formData, setFormData] = useState({
                topic: '',
                context: '',
                audience: '',
                constraints: '',
                format: '개조식 보고서 (Bullet Points)',
                reference: '',
                customRole: ''
            });
            
            // Advanced Settings
            const [isAdvanced, setIsAdvanced] = useState(false);
            const [useCoT, setUseCoT] = useState(true); // Chain of Thought
            const [tone, setTone] = useState('balanced'); // 'analytical', 'balanced', 'creative'

            const [links, setLinks] = useState([]);
            const [linkInput, setLinkInput] = useState('');
            const [files, setFiles] = useState([]);
            const fileInputRef = useRef(null);

            const [generated, setGenerated] = useState({ kr: '', en: '' });
            const [isAnimating, setIsAnimating] = useState(false);
            const [copyStatus, setCopyStatus] = useState({ kr: false, en: false });
            const resultRef = useRef(null);

            useEffect(() => { setSelectedCat(Categories[0]); }, []);

            useEffect(() => {
                setFormData(prev => ({ ...prev, topic: '', audience: '', constraints: '', reference: '', customRole: '' }));
                setLinks([]);
                setFiles([]);
            }, [selectedCat]);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const addLink = () => {
                if(linkInput.trim()) {
                    setLinks([...links, linkInput.trim()]);
                    setLinkInput('');
                }
            };

            const removeLink = (index) => {
                setLinks(links.filter((_, i) => i !== index));
            };

            const handleFileUpload = (e) => {
                const uploadedFiles = Array.from(e.target.files);
                uploadedFiles.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const content = e.target.result;
                        setFiles(prev => [...prev, { name: file.name, content: content }]);
                    };
                    const isText = file.type.startsWith('text/') || 
                                   file.name.endsWith('.md') || 
                                   file.name.endsWith('.json') || 
                                   file.name.endsWith('.js') || 
                                   file.name.endsWith('.py') ||
                                   file.name.endsWith('.csv') ||
                                   file.name.endsWith('.txt');
                    
                    if (isText) {
                        reader.readAsText(file);
                    } else {
                        setFiles(prev => [...prev, { name: file.name, content: null }]);
                    }
                });
                if(fileInputRef.current) fileInputRef.current.value = '';
            };

            const removeFile = (index) => {
                setFiles(files.filter((_, i) => i !== index));
            };

            // Expert Prompt Generation Logic
            const generatePrompt = () => {
                setIsAnimating(true);
                setCopyStatus({ kr: false, en: false });
                
                setTimeout(() => {
                    const { topic, context, audience, constraints, format, reference, customRole } = formData;
                    const role = selectedCat.id === 'custom' ? (customRole || 'Helpful AI Assistant') : selectedCat.promptType;
                    
                    // 1. References Build
                    let refStringKr = reference ? `- ${reference}\n` : '';
                    let refStringEn = reference ? `- ${reference}\n` : '';

                    if (links.length > 0) {
                        refStringKr += `\n[참고 링크 (Links)]\n${links.map(l => `- ${l}`).join('\n')}\n`;
                        refStringEn += `\n[Reference Links]\n${links.map(l => `- ${l}`).join('\n')}\n`;
                    }

                    if (files.length > 0) {
                        refStringKr += `\n[첨부 파일 (Attached Files)]\n`;
                        refStringEn += `\n[Attached Files]\n`;
                        files.forEach(f => {
                            if (f.content) {
                                refStringKr += `- 파일명: ${f.name} (아래 본문 참고)\n`;
                                refStringEn += `- Filename: ${f.name} (See content below)\n`;
                            } else {
                                refStringKr += `- 파일명: ${f.name} (파일 내용 확인 불가, 이름 참고)\n`;
                                refStringEn += `- Filename: ${f.name} (Content not accessible, refer to name)\n`;
                            }
                        });
                    }

                    // 2. File Content
                    let fileContentString = '';
                    files.forEach(f => {
                        if (f.content) {
                            fileContentString += `\n\n--- [Start of File: ${f.name}] ---\n${f.content}\n--- [End of File: ${f.name}] ---\n`;
                        }
                    });

                    // 3. Tone & Style Settings
                    let toneInstructionKr = "";
                    let toneInstructionEn = "";
                    
                    if (tone === 'analytical') {
                        toneInstructionKr = "매우 분석적이고 비판적인 어조를 유지하십시오. 근거 없는 낙관을 배제하고 데이터와 팩트에 기반하여 냉철하게 서술하십시오.";
                        toneInstructionEn = "Maintain a highly analytical and critical tone. Avoid baseless optimism; base all statements on data and facts.";
                    } else if (tone === 'creative') {
                        toneInstructionKr = "창의적이고 혁신적인 아이디어를 적극적으로 제안하십시오. 기존의 틀을 깨는 새로운 관점을 환영합니다.";
                        toneInstructionEn = "Propose creative and innovative ideas. New perspectives breaking conventional frameworks are welcomed.";
                    } else { // balanced
                        toneInstructionKr = "전문적이고 균형 잡힌 비즈니스 톤을 유지하십시오. 신뢰감을 주면서도 설득력 있는 문체를 사용하십시오.";
                        toneInstructionEn = "Maintain a professional and balanced business tone. Use a style that is both trustworthy and persuasive.";
                    }

                    // 4. CoT Instruction
                    const cotInstructionKr = useCoT ? "3. **[Chain of Thought]** 답변을 작성하기 전에 단계별로 생각하십시오. 논리적 흐름(원인-결과-대안)을 먼저 구조화한 뒤 최종 답변을 생성하십시오." : "";
                    const cotInstructionEn = useCoT ? "3. **[Chain of Thought]** Think step-by-step before generating the answer. Structure the logical flow (Cause-Effect-Alternative) first." : "";

                    // 5. Constructing the Expert Prompt (CO-STAR Framework inspired)
                    const krPrompt = `
### SYSTEM PROMPT (EXPERT MODE) ###

# 1. 페르소나 (Persona)
당신은 **${role}**입니다. 해당 분야에서 20년 이상의 실무 경험을 보유한 최고 전문가로서 행동하십시오. 단순한 정보 제공자가 아니라, 사용자의 전략적 파트너로서 통찰력 있는 조언을 제공해야 합니다.

# 2. 맥락 및 배경 (Context)
${context || '제공된 배경 정보 없음.'}

# 3. 목표 및 임무 (Objective & Task)
다음 주제에 대해 **${selectedCat.name}** 업무를 완벽하게 수행하십시오.
**주제:** ${topic}

# 4. 타겟 독자 (Audience)
${audience || '전문성을 갖춘 의사결정권자 또는 실무자'}

# 5. 스타일 및 톤 (Style & Tone)
- **${toneInstructionKr}**
- "행복배달부"님을 위해 정중하고 격식 있는 보고서 체(주로 개조식)를 사용하십시오.

# 6. 제약 조건 및 지침 (Constraints & Guidelines)
1. **${constraints || '핵심 내용 위주로 작성'}**
2. 사실 관계가 불확실한 경우 "확인 불가"로 명시하고, 웹 검색을 통해 최신 정보를 검증하십시오.
${cotInstructionKr}
4. 모든 주장은 논리적 근거(데이터, 사례)를 동반해야 합니다.
5. 아래 제공된 참고 자료가 있다면 적극적으로 반영하십시오.
6. **[자가 검증]** 답변 생성 전, 위 제약 조건을 모두 충족했는지 스스로 검토하십시오.

# 7. 참고 자료 (References)
${refStringKr || '없음'}

${fileContentString}

# 8. 출력 형식 (Output Format)
- 언어: 한국어 (Business Professional)
- 형식: ${format}
                    `.trim();

                    const enPrompt = `
### SYSTEM PROMPT (EXPERT MODE) ###

# 1. Persona
Act as a world-class **${role}**. You have over 20 years of field experience. Act not just as an information provider, but as a strategic partner providing insightful advice.

# 2. Context
${context || 'No context provided.'}

# 3. Objective & Task
Perform the **${selectedCat.name}** task for the following topic perfectly.
**Topic:** ${topic}

# 4. Audience
${audience || 'Professional decision-makers or practitioners'}

# 5. Style & Tone
- **${toneInstructionEn}**
- Maintain a formal business tone (Bullet points preferred) for "Happy Delivery Man".

# 6. Constraints & Guidelines
1. **${constraints || 'Focus on core content.'}**
2. If facts are uncertain, explicitly state "Unable to verify" and verify via Web Search.
${cotInstructionEn}
4. All arguments must be supported by logical evidence (data, case studies).
5. If references are provided below, reflect them actively.
6. **[Self-Correction]** Before finalizing, review if all constraints above are met.

# 7. References
${refStringEn || 'None'}

${fileContentString}

# 8. Output Format
- Language: English (Business Professional)
- Format: ${format}
                    `.trim();

                    setGenerated({ kr: krPrompt, en: enPrompt });
                    setIsAnimating(false);
                    setTimeout(() => resultRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
                }, 800);
            };

            const copyToClipboard = (text, lang) => {
                const handleSuccess = () => {
                     setCopyStatus(prev => ({ ...prev, [lang]: true }));
                     setTimeout(() => setCopyStatus(prev => ({ ...prev, [lang]: false })), 2000);
                };
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text).then(handleSuccess).catch(() => fallbackCopy(text));
                } else {
                    fallbackCopy(text);
                }
                function fallbackCopy(text) {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.position = "fixed"; textArea.style.left = "-9999px";
                    document.body.appendChild(textArea); textArea.focus(); textArea.select();
                    try { document.execCommand('copy'); handleSuccess(); } catch (err) { alert("클립보드 복사 실패"); }
                    document.body.removeChild(textArea);
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800 font-sans pb-20">
                    <header className="bg-white/90 backdrop-blur-md sticky top-0 z-20 border-b border-slate-200 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="bg-gradient-to-br from-indigo-500 to-purple-600 p-2.5 rounded-xl text-white shadow-lg shadow-indigo-200">
                                    <Icons.Sparkles />
                                </div>
                                <div>
                                    <h1 className="text-xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-indigo-700 via-purple-700 to-pink-600 tracking-tight">행복배달부 Prompt Master v4.0</h1>
                                    <p className="text-xs text-slate-500 font-medium">Pro Edition: Expert Logic & CoT Enabled</p>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
                        <aside className="lg:col-span-3 space-y-3 h-fit lg:sticky lg:top-24 overflow-y-auto max-h-[calc(100vh-100px)] custom-scrollbar">
                            <h2 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 px-2 flex items-center gap-2">Select Task <span className="bg-slate-200 text-slate-500 rounded-full px-1.5 py-0.5 text-[10px]">{Categories.length}</span></h2>
                            <div className="grid grid-cols-1 gap-2">
                                {Categories.map((cat) => (
                                    <button key={cat.id} onClick={() => setSelectedCat(cat)} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-200 text-left group border ${selectedCat.id === cat.id ? 'bg-white border-indigo-500 shadow-md ring-1 ring-indigo-100' : 'bg-white/50 border-transparent hover:bg-white hover:shadow-sm text-slate-600'}`}>
                                        <div className={`p-2 rounded-lg transition-colors shrink-0 ${selectedCat.id === cat.id ? 'bg-indigo-100 text-indigo-600' : 'bg-slate-100 text-slate-400 group-hover:text-slate-600'}`}><cat.icon /></div>
                                        <div className="min-w-0"><div className={`font-bold text-sm truncate ${selectedCat.id === cat.id ? 'text-indigo-900' : 'text-slate-700'}`}>{cat.name}</div><div className="text-[11px] opacity-70 truncate text-slate-500">{cat.desc}</div></div>
                                    </button>
                                ))}
                            </div>
                        </aside>

                        <div className="lg:col-span-9 space-y-8">
                            <section className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 lg:p-10 relative overflow-hidden transition-all">
                                <div className="absolute top-0 right-0 w-64 h-64 bg-gradient-to-bl from-indigo-50 to-pink-50 rounded-full blur-3xl -z-10 translate-x-20 -translate-y-20 opacity-60"></div>
                                <div className="flex items-center justify-between mb-8 border-b border-slate-100 pb-5">
                                    <div className="flex items-center gap-3"><div className="p-2 bg-indigo-50 text-indigo-600 rounded-lg"><selectedCat.icon /></div><div><h2 className="text-xl font-bold text-slate-800">{selectedCat.name}</h2><p className="text-sm text-slate-400">필요한 정보를 입력하면 최적의 프롬프트가 생성됩니다.</p></div></div>
                                    
                                    {/* Advanced Toggle */}
                                    <div className="flex items-center">
                                        <button onClick={() => setIsAdvanced(!isAdvanced)} className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-bold transition-all ${isAdvanced ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>
                                            <Icons.Settings /> 전문가 설정 (Advanced)
                                        </button>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-4">
                                    {/* Advanced Settings Panel */}
                                    {isAdvanced && (
                                        <div className="col-span-1 md:col-span-2 bg-indigo-50/50 border border-indigo-100 rounded-xl p-5 mb-4 animate-fade-in grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-bold text-indigo-800 mb-2 flex items-center gap-1"><Icons.Brain /> 논리 강화 (Chain of Thought)</label>
                                                <div className="flex items-center gap-3">
                                                    <button onClick={() => setUseCoT(!useCoT)} className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none ${useCoT ? 'bg-indigo-600' : 'bg-slate-300'}`}>
                                                        <span className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${useCoT ? 'translate-x-6' : 'translate-x-1'}`} />
                                                    </button>
                                                    <span className="text-xs text-slate-600">{useCoT ? "활성화 (권장)" : "비활성화"}</span>
                                                </div>
                                                <p className="text-[10px] text-slate-500 mt-1">AI가 답변 전 단계별로 추론하여 논리적 정확도를 높입니다.</p>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-indigo-800 mb-2">어조 설정 (Tone)</label>
                                                <div className="flex bg-white rounded-lg p-1 border border-indigo-100 shadow-sm">
                                                    <button onClick={() => setTone('analytical')} className={`flex-1 py-1.5 text-xs font-bold rounded-md transition-all ${tone === 'analytical' ? 'bg-indigo-100 text-indigo-700' : 'text-slate-500 hover:bg-slate-50'}`}>분석적</button>
                                                    <button onClick={() => setTone('balanced')} className={`flex-1 py-1.5 text-xs font-bold rounded-md transition-all ${tone === 'balanced' ? 'bg-indigo-100 text-indigo-700' : 'text-slate-500 hover:bg-slate-50'}`}>균형</button>
                                                    <button onClick={() => setTone('creative')} className={`flex-1 py-1.5 text-xs font-bold rounded-md transition-all ${tone === 'creative' ? 'bg-indigo-100 text-indigo-700' : 'text-slate-500 hover:bg-slate-50'}`}>창의적</button>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {selectedCat.id === 'custom' && (
                                        <div className="col-span-1 md:col-span-2 mb-2 animate-fade-in">
                                            <label className="block text-sm font-bold text-indigo-600 mb-1">🎭 페르소나/역할 (Role)</label>
                                            <input type="text" name="customRole" placeholder="예: 까칠하지만 유능한 영화 평론가, 친절한 초등학교 선생님 등" className="w-full px-4 py-3 bg-indigo-50/50 border-2 border-indigo-100 rounded-lg focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 outline-none transition-all placeholder:text-indigo-300 font-medium" value={formData.customRole} onChange={handleInputChange}/>
                                        </div>
                                    )}
                                    <div className="col-span-1 md:col-span-2"><SmartInput label="🔥 주제 / 핵심 내용 (Topic)" name="topic" value={formData.topic} onChange={handleInputChange} options={selectedCat.presets?.topic} placeholder="무엇을 도와드릴까요? (예: 000 기획안 작성)"/></div>
                                    <div className="col-span-1 md:col-span-2"><SmartInput label="🧠 배경 상황 (Context)" name="context" value={formData.context} onChange={handleInputChange} options={selectedCat.presets?.context} placeholder="이 작업을 수행하는 배경이나 목적을 설명해주세요." isTextArea={true}/></div>
                                    <div><SmartInput label="🎯 타겟 독자 (Audience)" name="audience" value={formData.audience} onChange={handleInputChange} options={selectedCat.presets?.audience} placeholder="누가 이 글을 읽나요?"/></div>
                                    <div><SmartInput label="⚠️ 제약 조건 (Constraints)" name="constraints" value={formData.constraints} onChange={handleInputChange} options={selectedCat.presets?.constraints} placeholder="꼭 지켜야 할 규칙이 있나요?"/></div>

                                    {/* Reference Section */}
                                    <div className="col-span-1 md:col-span-2">
                                        <label className="block text-sm font-bold text-slate-700 mb-2 flex items-center gap-2">
                                            <Icons.Paperclip /> 참고 자료 / 예시 (References & Examples)
                                        </label>
                                        
                                        {/* Text Area */}
                                        <textarea name="reference" rows="2" placeholder="텍스트 메모나 예시 문구를 붙여넣으세요." className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400 outline-none transition-all text-sm resize-none placeholder:text-slate-400 mb-3" value={formData.reference} onChange={handleInputChange}/>
                                        
                                        {/* Links */}
                                        <div className="flex gap-2 mb-3">
                                            <div className="relative flex-1">
                                                <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><Icons.Link /></div>
                                                <input type="text" placeholder="참고 URL 입력 (예: 기사 링크, 노션 페이지)" className="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-200 outline-none" value={linkInput} onChange={(e) => setLinkInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && addLink()}/>
                                            </div>
                                            <button onClick={addLink} className="px-4 py-2 bg-indigo-50 text-indigo-600 rounded-lg text-sm font-bold hover:bg-indigo-100 flex items-center gap-1"><Icons.Plus /> 추가</button>
                                        </div>
                                        {links.length > 0 && (
                                            <div className="flex flex-wrap gap-2 mb-4">
                                                {links.map((link, idx) => (
                                                    <span key={idx} className="flex items-center gap-1.5 px-3 py-1 bg-indigo-50 text-indigo-700 rounded-full text-xs font-medium border border-indigo-100 max-w-full">
                                                        <span className="truncate max-w-[200px]">{link}</span>
                                                        <button onClick={() => removeLink(idx)} className="hover:text-red-500"><Icons.Trash /></button>
                                                    </span>
                                                ))}
                                            </div>
                                        )}

                                        {/* Files */}
                                        <div className="flex items-center gap-3">
                                            <input type="file" ref={fileInputRef} onChange={handleFileUpload} className="hidden" multiple />
                                            <button onClick={() => fileInputRef.current?.click()} className="px-4 py-2.5 border-2 border-dashed border-slate-300 rounded-lg text-slate-500 text-sm font-bold hover:border-indigo-400 hover:text-indigo-600 hover:bg-indigo-50 transition-all flex items-center gap-2 w-full justify-center">
                                                <Icons.Upload /> 
                                                <span>파일 첨부 (텍스트 파일 자동 읽기)</span>
                                            </button>
                                        </div>
                                        {files.length > 0 && (
                                            <div className="mt-3 space-y-2">
                                                {files.map((file, idx) => (
                                                    <div key={idx} className="flex items-center justify-between px-3 py-2 bg-slate-50 rounded-lg border border-slate-200 text-sm">
                                                        <div className="flex items-center gap-2 overflow-hidden">
                                                            <Icons.FileText />
                                                            <span className="truncate font-medium text-slate-700">{file.name}</span>
                                                            {file.content && <span className="text-[10px] bg-green-100 text-green-700 px-1.5 py-0.5 rounded">내용 포함됨</span>}
                                                        </div>
                                                        <button onClick={() => removeFile(idx)} className="text-slate-400 hover:text-red-500 p-1"><Icons.Trash /></button>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>

                                    <div className="col-span-1 md:col-span-2 mt-2"><SmartInput label="📋 출력 형식 (Output Format)" name="format" value={formData.format} onChange={handleInputChange} options={OutputFormats} placeholder="원하는 형식을 직접 입력하세요"/></div>
                                </div>

                                <div className="mt-10 pt-6 border-t border-slate-100">
                                    <button onClick={generatePrompt} disabled={!formData.topic} className={`w-full py-4 rounded-xl font-bold text-lg shadow-xl flex items-center justify-center gap-3 transition-all transform active:scale-[0.98] ${!formData.topic ? 'bg-slate-200 text-slate-400 cursor-not-allowed shadow-none' : 'bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 text-white hover:shadow-indigo-200 hover:brightness-110'}`}>
                                        {isAnimating ? (<><div className="w-6 h-6 border-3 border-white/30 border-t-white rounded-full animate-spin"></div><span className="animate-pulse">프롬프트 제작 중...</span></>) : (<><Icons.Sparkles /> 최적화 프롬프트 생성하기</>)}
                                    </button>
                                </div>
                            </section>

                            {(generated.kr || generated.en) && (
                                <div ref={resultRef} className="scroll-mt-24 space-y-6 animate-fade-in-up">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="bg-white rounded-2xl shadow-lg border border-slate-100 p-0 flex flex-col h-full overflow-hidden hover:shadow-xl transition-shadow ring-1 ring-indigo-50">
                                            <div className="bg-indigo-50/50 px-6 py-4 flex justify-between items-center border-b border-indigo-50">
                                                <span className="flex items-center gap-2 text-indigo-700 font-bold"><span className="text-xl">🇰🇷</span> 한국어 프롬프트 (High Quality)</span>
                                                <button onClick={() => copyToClipboard(generated.kr, 'kr')} className={`flex items-center gap-1.5 text-xs font-bold px-3 py-1.5 rounded-full transition-all ${copyStatus.kr ? 'bg-green-100 text-green-700' : 'bg-white text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 border border-slate-200'}`}>{copyStatus.kr ? <><Icons.CheckCircle /> 복사 완료!</> : <><Icons.Copy /> 복사하기</>}</button>
                                            </div>
                                            <pre className="flex-1 whitespace-pre-wrap p-6 text-sm text-slate-700 leading-relaxed font-mono overflow-y-auto max-h-[500px] selection:bg-indigo-100">{generated.kr}</pre>
                                        </div>
                                        <div className="bg-white rounded-2xl shadow-lg border border-slate-100 p-0 flex flex-col h-full overflow-hidden hover:shadow-xl transition-shadow ring-1 ring-purple-50">
                                            <div className="bg-purple-50/50 px-6 py-4 flex justify-between items-center border-b border-purple-50">
                                                <span className="flex items-center gap-2 text-purple-700 font-bold"><span className="text-xl">🇺🇸</span> English Prompt (High Quality)</span>
                                                <button onClick={() => copyToClipboard(generated.en, 'en')} className={`flex items-center gap-1.5 text-xs font-bold px-3 py-1.5 rounded-full transition-all ${copyStatus.en ? 'bg-green-100 text-green-700' : 'bg-white text-slate-500 hover:text-purple-600 hover:bg-purple-50 border border-slate-200'}`}>{copyStatus.en ? <><Icons.CheckCircle /> Copied!</> : <><Icons.Copy /> Copy</>}</button>
                                            </div>
                                            <pre className="flex-1 whitespace-pre-wrap p-6 text-sm text-slate-700 leading-relaxed font-mono overflow-y-auto max-h-[500px] selection:bg-purple-100">{generated.en}</pre>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
